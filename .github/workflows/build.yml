name: Build APK and Create Release

on:
  push:
    tags:
      - 'v*'
      workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      
      - name: Create keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > release.keystore
      
      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          storeFile=../release.keystore
          keyAlias=${{ secrets.KEY_ALIAS }}
          storePassword=${{ secrets.STORE_PASSWORD }}
          EOF
      
      - name: Grant execute permission for gradle wrapper
        run: chmod +x gradlew
      
      - name: Build Release APK
        run: |
          ./gradlew clean assemble\*Release \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            --parallel
      
      - name: Copy APKs to release directory
        run: |
          mkdir -p Release/apk
          find app/build/outputs/apk -name "*release*.apk" -type f | while read apk; do
            cp "$apk" "Release/apk/$(basename "$apk")"
          done
      
      - name: List generated APKs
        run: |
          echo "Generated APK files:"
          ls -lh Release/apk/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: Release/apk/*.apk
          body: |
            # WebHomeTV Release ${{ github.ref_name }}
            
            ## Changes
            ${{ github.event.head_commit.message }}
            
            ## Files
            - leanback-arm64_v8a.apk (TV 版本 - ARM64)
            - leanback-armeabi_v7a.apk (TV 版本 - ARM32)
            - mobile-arm64_v8a.apk (手机版本 - ARM64)
            - mobile-armeabi_v7a.apk (手机版本 - ARM32)
            
            ## Installation
            Download the appropriate APK for your device architecture and install.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
