name: Build APK and Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag，例如 v5.5.2-1"
        required: true
        type: string
      prerelease:
        description: "是否标记为预发布版本"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
  ORG_GRADLE_PROJECT_org.gradle.java.installations.auto-download: "false"
  ORG_GRADLE_PROJECT_org.gradle.java.installations.auto-detect: "true"

jobs:
  build-release:
    name: Build and Release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release info
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            PRERELEASE="${{ inputs.prerelease }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            PRERELEASE="false"
          else
            VERSION_NAME=$(grep -m1 'versionName' app/build.gradle | sed -E 's/.*versionName[[:space:]]+"([^"]+)".*/\1/')
            TAG="v${VERSION_NAME}"
            PRERELEASE="true"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"
          echo "Resolved prerelease: $PRERELEASE"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Configure Gradle Java toolchain
        shell: bash
        run: |
          echo "org.gradle.java.installations.auto-download=false" >> gradle.properties
          echo "org.gradle.java.installations.paths=$JAVA_HOME" >> gradle.properties
          echo "JAVA_HOME=$JAVA_HOME"
          "$JAVA_HOME/bin/java" -version
          grep -E 'org.gradle.java.installations' gradle.properties

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platform-tools" "build-tools;36.0.0" "platforms;android-36"
          mkdir -p "$ANDROID_HOME/platforms"
          ln -sfn "$ANDROID_HOME/platforms/android-36" "$ANDROID_HOME/platforms/android-37"
          ls -lh "$ANDROID_HOME/platforms/android-37/android.jar"

      - name: Verify compileSdk
        shell: bash
        run: |
          grep 'compileSdk' gradle/libs.versions.toml

      # - name: Patch release build for CI
      #  shell: bash
      #  run: |
      #    perl -0pi -e 's/minifyEnabled = true/minifyEnabled = false/g; s/shrinkResources = true/shrinkResources = false/g' app/build.gradle
      #    grep -oE 'minifyEnabled = (true|false)|shrinkResources = (true|false)' app/build.gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Clean build
        shell: bash
        run: |
          ./gradlew --no-daemon clean

      - name: Fix missing Chaquopy consumer proguard file
        shell: bash
        run: |
          mkdir -p chaquo/build/python
          touch chaquo/build/python/proguard-rules.pro
          ls -lh chaquo/build/python/proguard-rules.pro

      - name: Build release APKs
        shell: bash
        run: |
          set +e
          ./gradlew --no-daemon --stacktrace --console=plain \
           #  :app:assembleLeanbackArm64_v8aRelease \
            :app:assembleLeanbackArmeabi_v7aRelease \
            :app:assembleMobileArm64_v8aRelease \
            :app:assembleMobileArmeabi_v7aRelease > gradle-build.log 2>&1

          status=$?
          if [[ $status -ne 0 ]]; then
            echo "Gradle build failed with exit code $status"
            echo "---- Last 200 lines of gradle-build.log ----"
            tail -n 200 gradle-build.log
            exit $status
          fi

      - name: Collect APKs
        shell: bash
        run: |
          rm -rf Release/apk
          mkdir -p Release/apk

          find app/build/outputs/apk -type f -name "*.apk" -path "*/release/*" -print0 | while IFS= read -r -d '' apk; do
            cp "$apk" "Release/apk/$(basename "$apk")"
          done

          cd Release/apk

          shopt -s nullglob
          APKS=(*.apk)

          if (( ${#APKS[@]} == 0 )); then
            echo "No APK files found."
            find ../../app/build/outputs/apk -type f || true
            exit 1
          fi

          sha256sum "${APKS[@]}" > SHA256SUMS.txt
          ls -lh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webhtv-${{ steps.vars.outputs.tag }}-apk
          path: Release/apk/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: WebHomeTV ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.vars.outputs.prerelease }}
          generate_release_notes: true
          files: |
            Release/apk/*.apk
            Release/apk/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
