name: Build APK and Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag，例如 v5.5.2-1"
        required: true
        type: string
      prerelease:
        description: "是否标记为预发布版本"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

jobs:
  build-release:
    name: Build and Release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release info
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            TAG="${GITHUB_REF_NAME}"
            PRERELEASE="false"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platform-tools" "build-tools;36.0.0" "platforms;android-36"

      - name: Patch compileSdk for CI
        shell: bash
        run: |
          sed -i 's/compileSdk = "37"/compileSdk = "36"/' gradle/libs.versions.toml
          grep 'compileSdk' gradle/libs.versions.toml

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build release APKs
        shell: bash
        run: |
          ./gradlew --no-daemon --parallel --stacktrace clean \
            :app:assembleLeanbackArm64_v8aRelease \
            :app:assembleLeanbackArmeabi_v7aRelease \
            :app:assembleMobileArm64_v8aRelease \
            :app:assembleMobileArmeabi_v7aRelease

      - name: Collect APKs
        shell: bash
        run: |
          rm -rf Release/apk
          mkdir -p Release/apk

          find app/build/outputs/apk -type f -name "*.apk" -path "*/release/*" -print0 | while IFS= read -r -d '' apk; do
            cp "$apk" "Release/apk/$(basename "$apk")"
          done

          cd Release/apk

          shopt -s nullglob
          APKS=(*.apk)

          if (( ${#APKS[@]} == 0 )); then
            echo "No APK files found."
            find ../../app/build/outputs/apk -type f || true
            exit 1
          fi

          sha256sum "${APKS[@]}" > SHA256SUMS.txt
          ls -lh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webhtv-${{ steps.vars.outputs.tag }}-apk
          path: Release/apk/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: WebHomeTV ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.vars.outputs.prerelease }}
          generate_release_notes: true
          files: |
            Release/apk/*.apk
            Release/apk/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
